<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Clientes</h4>
    <button class="btn btn-primary btn-sm" id="btn-novo">+ Novo Cliente</button>
  </div>

  <div id="alerta"></div>

  <div class="card mb-4 d-none" id="card-form">
    <div class="card-body">
      <h6 class="card-title mb-3" id="form-titulo">Novo Cliente</h6>
      <form id="form-cliente" novalidate>
        <input type="hidden" id="cliente-id" />
        <div class="row g-2">
          <div class="col-md-6">
            <input type="text" class="form-control form-control-sm" id="nome" placeholder="Nome *" required />
          </div>
          <div class="col-md-6">
            <input type="email" class="form-control form-control-sm" id="email" placeholder="E-mail *" required />
          </div>
          <div class="col-md-6">
            <input type="text" class="form-control form-control-sm" id="telefone" placeholder="Telefone" />
          </div>
          <div class="col-md-6">
            <input type="text" class="form-control form-control-sm" id="cidade" placeholder="Cidade" />
          </div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-success btn-sm" id="btn-salvar">Salvar</button>
          <button type="button" class="btn btn-secondary btn-sm" id="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover table-sm mb-0" id="tabela">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" class="text-center text-muted py-3">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div class="modal fade" id="modal-excluir" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body text-center py-4">
        <p class="mb-3">Excluir este cliente?</p>
        <button class="btn btn-danger btn-sm me-2" id="btn-confirmar-excluir">Excluir</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
